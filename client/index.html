<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GoLocal - Find trusted local service providers near you. Book home services, repairs, cleaning, and more." />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- Preconnect to API server for faster connection -->
    <link rel="preconnect" href="http://localhost:5001" />
    
    <!-- Font optimization -->
    <style>
      /* Critical CSS - render blocking styles */
      :root {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
      }
      
      /* Font display swap to avoid FOIT */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: local('Inter');
      }
      
      /* Instant background to reduce visual delay */
      body {
        background-color: rgb(15 23 42);
        color: rgb(248 250 252);
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      
      /* Initial loading state */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <title>GoLocal - Find Trusted Local Services Near You | Service Marketplace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
